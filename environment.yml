name: fastscrubber_env
channels:
  - pytorch
  - defaults
dependencies:
  - python=3.9.20
  - pip
  - pip:
    # PyTorch — pin exact CUDA build to match training environment
    - torch==2.4.1+cu124
    - torchvision==0.19.1+cu124
    - torchaudio==2.4.1+cu124
 
    # nnUNet
    - nnunetv2==2.5.1
 
    # Key scientific libraries — locked to same major version to avoid
    # breaking API changes across major releases
    - numpy~=1.26          # <2.0
    - nibabel~=5.3         # <6.0
    - scipy~=1.13          # <2.0
    - simpleitk~=2.4       # <3.0
    - scikit-image~=0.24   # <1.0
    - scikit-learn~=1.5    # <2.0
    - pandas~=2.2          # <3.0
 
    --extra-index-url https://download.pytorch.org/whl/cu124

# trained on cuda 12.4, below is the exact environment used for training. 
